<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="border border-1 d-flex">
      <div class="border border-1" style="width: 330px; height: 100vh">
        <div
          class="p-4"
          style="
            background-color: #121212;
            border-radius: 15px;
            height: 120px;
            font-size: larger;
          "
        >
          <div class="d-flex gap-2">
            <div><i style="color: white" class="fa-solid fa-house"></i></div>
            <div>
              <p>
                <a class="text-decoration-none" style="color: white" href=""
                  >Home</a
                >
              </p>
            </div>
          </div>

          <div class="d-flex gap-2">
            <div>
              <i style="color: white" class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div>
              <p>
                <a class="text-decoration-none" style="color: white" href=""
                  >Search</a
                >
              </p>
            </div>
          </div>
        </div>

        <div
          class="border border-1 rounded-4 mt-2"
          style="height: 520px; background-color: #121212"
        >
          <div class="d-flex gap-3 p-2">
            <div class="d-flex gap-3">
              <div>
                <i
                  style="color: white; font-size: x-large"
                  class="fa-solid fa-lines-leaning"
                ></i>
              </div>
              <div>
                <p style="font-weight: 500; color: white">Your Library</p>
              </div>
            </div>
            <div class="d-flex" style="padding-left: 120px">
              <div>
                <a href=""
                  ><i
                    style="padding-right: 20px; color: white"
                    class="fa-solid fa-plus"
                  ></i
                ></a>
              </div>
              <div>
                <a href=""
                  ><i
                    style="color: white"
                    class="fa-solid fa-long-arrow-right"
                  ></i
                ></a>
              </div>
            </div>
          </div>

          <div class="pt-3 m-2 rounded-3" style="background-color: gray">
            <div class="p-3">
              <div><h5>Create your frist playlist</h5></div>
              <div><p>It's easy, we'll help you</p></div>

              <div>
                <button class="rounded-5" style="height: 40px; width: 150px">
                  <a class="text-decoration-none" style="color: black" href=""
                    >Create playlist</a
                  >
                </button>
              </div>
            </div>
          </div>

          <div class="mt-4 m-2 rounded-3" style="background-color: gray">
            <div class="p-3">
              <div>
                <h5>
                  Let's find some podcasts to <br />
                  follow
                </h5>
              </div>
              <div>
                <p>
                  We'll keep you updated on new <br />
                  episodes
                </p>
              </div>
              <div>
                <div>
                  <button class="rounded-5" style="height: 40px; width: 168px">
                    <a class="text-decoration-none" style="color: black" href=""
                      >Browse podcasts</a
                    >
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="s1 border border-1"
        style="flex: 1; height: 100vh; background-color: #121212"
      >
        <div style="position: sticky; top: 0; background-color: #121212">
          <div class="p-3 d-flex">
            <div class="d-flex gap-4">
              <div>
                <i style="color: white" class="fa-solid fa-chevron-left"></i>
              </div>
              <div>
                <i style="color: white" class="fa-solid fa-chevron-right"></i>
              </div>
            </div>

            <div class="d-flex gap-4" style="padding-left: 60%">
              <div>
                <div>
                  <button class="rounded-5" style="height: 45px; width: 150px">
                    <a class="text-decoration-none" style="color: black" href=""
                      >Explore Premium</a
                    >
                  </button>
                </div>
              </div>
              <div>
                <div>
                  <button
                    class="rounded-5"
                    style="height: 40px; width: 150px; background-color: black"
                  >
                    <a class="text-decoration-none" style="color: white" href=""
                      ><i class="fa-regular fa-circle-down pt-1"></i>Install
                      App</a
                    >
                  </button>
                </div>
              </div>
              <div>
                <div class="pt-1">
                  <button
                    style="background-color: black"
                    class="rounded-circle"
                  >
                    <a href=""
                      ><i style="color: white" class="fa-solid fa-user"></i
                    ></a>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="p-3">
            <div><h4 style="color: white; font-weight: 700;">Recently played</h4></div>
            <div
              class="mt-3  rounded-1 shadow"
              style="height: 269px; width: fit-content; background-color: #232323;"
            >
              <div class="p-2 ">
                <img class="rounded-3 pt-1" style="height: 145px; width: 180px;" src="../images/card1img.jpeg" >
              </div>
              <div class="p-3">
                <div><h5 style="color: white;">Top 50 - Global</h5></div>
                <div>
                  <p style="color: white;">Your daily updates of <br />the most played</p>
                </div>
              </div>
            </div>
          </div>

          <div>
            
          </div>
        </div>
      </div>

      <div
        class="border border-1"
        style="
          background-color: black;
          position: fixed;
          bottom: 0;
          width: 100%;
          height: 80px;
        "
      ></div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
